<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻推荐 - 诊断版</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a0f; font-family: monospace; color: #0f0; overflow-y: auto; font-size: 12px; }
    .debug { padding: 10px; }
    .debug h2 { color: #00ff88; margin: 20px 0 10px; font-size: 16px; }
    .debug pre { background: #1a1a2e; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
    .success { color: #00ff88; }
    .error { color: #ff4444; }
    .warning { color: #ffaa00; }
    .btn { background: #00ff88; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="debug">
    <h1>🔍 Web App 诊断工具</h1>
    <p>此页面用于诊断 Telegram Web App sendData 问题</p>
    
    <h2>1️⃣ Telegram SDK 状态</h2>
    <pre id="sdk-status">检查中...</pre>
    
    <h2>2️⃣ 用户信息</h2>
    <pre id="user-info">检查中...</pre>
    
    <h2>3️⃣ initData</h2>
    <pre id="init-data">检查中...</pre>
    
    <h2>4️⃣ 测试 sendData</h2>
    <button class="btn" onclick="testSendData()">🧪 发送测试数据</button>
    <pre id="send-result">点击按钮测试...</pre>
    
    <h2>5️⃣ 新闻选择</h2>
    <button class="btn" onclick="sendNewsData()">📰 发送新闻选择</button>
    <pre id="news-result">点击按钮测试...</pre>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    const results = {};
    
    // 1. SDK 状态
    results.sdk = {
      ready: !!tg.ready,
      expand: !!tg.expand,
      sendData: !!tg.sendData,
      close: !!tg.close,
      MainButton: !!tg.MainButton,
      version: tg.version || 'unknown'
    };
    document.getElementById('sdk-status').textContent = JSON.stringify(results.sdk, null, 2);
    
    // 2. 用户信息
    tg.ready();
    results.user = tg.initDataUnsafe?.user || null;
    results.isInTelegram = !!results.user;
    document.getElementById('user-info').textContent = JSON.stringify({
      isInTelegram: results.isInTelegram,
      user: results.user
    }, null, 2);
    
    // 3. initData
    results.initData = {
      initDataUnsafe: tg.initDataUnsafe ? '存在' : '不存在',
      initData: tg.initData ? '存在 (已签名)' : '不存在',
      hasUser: !!tg.initDataUnsafe?.user,
      hasQueryId: !!tg.initDataUnsafe?.query_id
    };
    document.getElementById('init-data').textContent = JSON.stringify(results.initData, null, 2);
    
    // 标记是否在 Telegram 内
    const isInTelegram = !!tg.initDataUnsafe?.user;
    
    // 4. 测试 sendData
    async function testSendData() {
      const resultEl = document.getElementById('send-result');
      
      if (!isInTelegram) {
        resultEl.textContent = '❌ 不在 Telegram 环境中\n\n请在 Telegram 内打开此页面\n\n当前环境：' + window.location.href;
        resultEl.className = 'error';
        return;
      }
      
      try {
        tg.expand();
        const testData = { type: 'test', timestamp: Date.now() };
        tg.sendData(JSON.stringify(testData));
        resultEl.textContent = '✅ sendData 调用成功\n\n数据已发送到 Bot\n\n请检查 Bot 是否收到消息';
        resultEl.className = 'success';
        
        setTimeout(() => tg.close(), 2000);
      } catch (e) {
        resultEl.textContent = '❌ sendData 失败\n\n错误：' + e.message + '\n\n堆栈：' + e.stack;
        resultEl.className = 'error';
      }
    }
    
    // 5. 发送新闻数据
    async function sendNewsData() {
      const resultEl = document.getElementById('news-result');
      
      if (!isInTelegram) {
        resultEl.textContent = '❌ 不在 Telegram 环境中';
        resultEl.className = 'error';
        return;
      }
      
      try {
        const newsData = {
          type: 'news_selection',
          user: {
            id: tg.initDataUnsafe.user.id,
            username: tg.initDataUnsafe.user.username
          },
          selected: [
            { id: '1', title: '测试新闻 1', category: 'ai' },
            { id: '2', title: '测试新闻 2', category: 'tech' }
          ],
          timestamp: Date.now()
        };
        
        tg.sendData(JSON.stringify(newsData));
        resultEl.textContent = '✅ 新闻数据已发送\n\n' + JSON.stringify(newsData, null, 2);
        resultEl.className = 'success';
        
        setTimeout(() => tg.close(), 2000);
      } catch (e) {
        resultEl.textContent = '❌ 发送失败\n\n' + e.message;
        resultEl.className = 'error';
      }
    }
    
    // 自动展开
    if (isInTelegram) {
      tg.expand();
      tg.MainButton.setText("提交测试数据");
      tg.MainButton.show();
      tg.MainButton.onClick(() => testSendData());
    }
  </script>
</body>
</html>
