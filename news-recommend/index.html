<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻推荐</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; overflow-y: auto; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; padding-bottom: 120px; }
    .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
    .header h1 { font-size: 24px; color: #00ff88; margin-bottom: 8px; }
    .header p { font-size: 14px; color: #888; }
    .category-filter { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
    .category-btn { flex-shrink: 0; padding: 8px 16px; background: #1a1a2e; border: 1px solid #333; border-radius: 20px; color: #fff; font-size: 13px; cursor: pointer; }
    .category-btn.active { background: #00ff88; color: #000; border-color: #00ff88; }
    .news-list { display: flex; flex-direction: column; gap: 12px; }
    .news-item { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 16px; display: flex; gap: 12px; align-items: flex-start; }
    .news-item.selected { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
    .news-checkbox { width: 24px; height: 24px; border: 2px solid #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
    .news-checkbox.checked { background: #00ff88; border-color: #00ff88; }
    .news-checkbox.checked::after { content: "✓"; color: #000; font-weight: bold; font-size: 16px; }
    .news-content { flex: 1; min-width: 0; }
    .news-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
    .news-meta { display: flex; gap: 12px; font-size: 12px; color: #888; }
    .news-source { color: #00ff88; }
    .news-tag { background: #333; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .submit-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; border-top: 1px solid #333; padding: 16px; display: flex; flex-direction: column; gap: 10px; align-items: center; z-index: 100; }
    .selected-count { font-size: 14px; color: #888; }
    .selected-count span { color: #00ff88; font-weight: bold; }
    .submit-btn { background: #00ff88; color: #000; border: none; padding: 12px 32px; border-radius: 24px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; max-width: 300px; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 12px; color: #888; text-align: center; }
    .status.success { color: #00ff88; }
    .status.error { color: #ff4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📰 新闻推荐</h1>
      <p>选择你感兴趣的新闻，获取个性化推荐</p>
    </div>
    <div class="category-filter" id="categoryFilter">
      <button class="category-btn active" data-category="all">全部</button>
      <button class="category-btn" data-category="ai">AI</button>
      <button class="category-btn" data-category="tech">科技</button>
      <button class="category-btn" data-category="finance">财经</button>
      <button class="category-btn" data-category="world">国际</button>
      <button class="category-btn" data-category="china">国内</button>
    </div>
    <div class="news-list" id="newsList"></div>
  </div>
  <div class="submit-bar">
    <div class="selected-count">已选择 <span id="selectedCount">0</span> 条</div>
    <button class="submit-btn" id="submitBtn" disabled>提交选择</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // 获取用户 ID
    const user = tg.initDataUnsafe?.user;
    const userId = user?.id || 'unknown';
    const username = user?.username || 'unknown';
    
    console.log('Telegram WebApp 初始化', { userId, username });
    
    let newsData = [], selectedIds = new Set(), currentCategory = 'all';
    
    async function loadNews() {
      try {
        const res = await fetch('news-data.json');
        newsData = await res.json();
        renderNews();
      } catch (e) {
        setStatus('加载失败：' + e.message, 'error');
      }
    }
    
    function renderNews() {
      const filtered = currentCategory === 'all' ? newsData : newsData.filter(n => n.category === currentCategory);
      document.getElementById('newsList').innerHTML = filtered.map(news => `
        <div class="news-item ${selectedIds.has(news.id) ? 'selected' : ''}" data-id="${news.id}">
          <div class="news-checkbox ${selectedIds.has(news.id) ? 'checked' : ''}" onclick="toggleSelect('${news.id}')"></div>
          <div class="news-content">
            <div class="news-title">${news.title}</div>
            <div class="news-meta">
              <span class="news-source">${news.source}</span>
              <span class="news-tag">${news.category.toUpperCase()}</span>
              <span>${news.time_display || ''}</span>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function toggleSelect(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      renderNews();
      updateSubmitBar();
    }
    
    function updateSubmitBar() {
      const count = selectedIds.size;
      document.getElementById('selectedCount').textContent = count;
      document.getElementById('submitBtn').disabled = count === 0;
    }
    
    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }
    
    async function submitSelection() {
      const selected = newsData.filter(n => selectedIds.has(n.id));
      const data = {
        type: 'news_selection',
        user: { id: userId, username: username },
        selected: selected.map(n => ({ id: n.id, title: n.title, category: n.category })),
        timestamp: Date.now()
      };
      
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '发送中...';
      
      try {
        // 方案 1: 尝试 sendData
        if (tg.sendData) {
          tg.sendData(JSON.stringify(data));
          setStatus('数据已发送，页面将关闭...', 'success');
          setTimeout(() => tg.close(), 1500);
        } else {
          throw new Error('sendData 不可用');
        }
      } catch (e) {
        console.error('sendData 失败:', e);
        // 方案 2: 使用 Telegram Link 发送消息
        try {
          const encoded = encodeURIComponent(JSON.stringify(data));
          const link = `https://t.me/medivhc_ai_bot?start=selection_${btoa(JSON.stringify(data))}`;
          window.location.href = link;
          setStatus('正在跳转到 Bot...', 'success');
        } catch (e2) {
          console.error('方案 2 失败:', e2);
          // 方案 3: 显示数据让用户复制
          setStatus('发送失败，请截图保存：' + JSON.stringify(data, null, 2), 'error');
        }
      }
    }
    
    document.getElementById('submitBtn').addEventListener('click', submitSelection);
    
    document.getElementById('categoryFilter').addEventListener('click', e => {
      if (e.target.classList.contains('category-btn')) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentCategory = e.target.dataset.category;
        renderNews();
      }
    });
    
    loadNews();
  </script>
</body>
</html>
