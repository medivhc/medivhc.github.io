<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻推荐</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #fff; font-family: -apple-system, sans-serif; padding: 16px; padding-bottom: 140px; }
    h1 { color: #00ff88; margin-bottom: 8px; }
    .status { background: #1a1a2e; padding: 10px; border-radius: 8px; margin: 16px 0; font-size: 12px; border-left: 3px solid #00ff88; }
    .category-filter { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
    .category-btn { flex-shrink: 0; padding: 8px 16px; background: #1a1a2e; border: 1px solid #333; border-radius: 20px; color: #fff; font-size: 13px; cursor: pointer; }
    .category-btn.active { background: #00ff88; color: #000; }
    .news-list { display: flex; flex-direction: column; gap: 12px; }
    .news-item { background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 14px; display: flex; gap: 12px; }
    .news-item.selected { border-color: #00ff88; background: rgba(0,255,136,0.1); }
    .news-checkbox { width: 24px; height: 24px; border: 2px solid #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .news-checkbox.checked { background: #00ff88; }
    .news-checkbox.checked::after { content: "✓"; color: #000; font-weight: bold; }
    .submit-area { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a2e; border-top: 1px solid #333; padding: 16px; }
    .btn { background: #00ff88; color: #000; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin: 8px 0; }
    .btn:disabled { opacity: 0.5; }
    .log { background: #000; padding: 8px; border-radius: 6px; font-size: 10px; color: #0f0; margin-top: 12px; max-height: 100px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>📰 新闻推荐</h1>
  <div class="status">✅ 数据发送到 VPS | 我来监控并回复</div>
  <div class="category-filter" id="categoryFilter">
    <button class="category-btn active" data-category="all">全部</button>
    <button class="category-btn" data-category="ai">AI</button>
    <button class="category-btn" data-category="tech">科技</button>
    <button class="category-btn" data-category="finance">财经</button>
  </div>
  <div class="news-list" id="newsList"></div>
  <div class="submit-area">
    <div style="margin-bottom:12px">已选择 <span id="selectedCount" style="color:#00ff88;font-weight:bold">0</span> 条</div>
    <button class="btn" id="sendBtn" disabled>📡 发送选择</button>
    <div class="log" id="log"></div>
  </div>
  <script>
    const tg = window.Telegram.WebApp;
    const VPS_ENDPOINT = "http://192.3.53.155:8899/receive";
    const logs = [];
    function log(msg) { logs.unshift("[" + new Date().toLocaleTimeString() + "] " + msg); document.getElementById("log").textContent = logs.join("\n"); }
    tg.ready(); tg.expand();
    const user = tg.initDataUnsafe?.user || {};
    log("初始化完成");
    const newsData = [
      {id:"1", title:"OpenAI 发布 GPT-4o 新版本", source:"TechCrunch", category:"ai"},
      {id:"2", title:"苹果 WWDC 2024 即将召开", source:"The Verge", category:"tech"},
      {id:"3", title:"美联储维持利率不变", source:"Reuters", category:"finance"},
      {id:"4", title:"Claude 3.5 超越 GPT-4", source:"Anthropic", category:"ai"},
      {id:"5", title:"欧盟通过 AI 法案", source:"BBC", category:"finance"},
      {id:"6", title:"字节豆包大模型发布", source:"36 氪", category:"china"},
      {id:"7", title:"特斯拉 FSD V12 推送", source:"Electrek", category:"tech"},
      {id:"8", title:"Midjourney V6 发布", source:"Midjourney", category:"ai"}
    ];
    let selectedIds = new Set(), currentCategory = "all";
    function renderNews() {
      const filtered = currentCategory === "all" ? newsData : newsData.filter(n => n.category === currentCategory);
      document.getElementById("newsList").innerHTML = filtered.map(n => '<div class="news-item ' + (selectedIds.has(n.id)?"selected":"") + '" onclick="toggle('' + n.id + '')"><div class="news-checkbox ' + (selectedIds.has(n.id)?"checked":"") + '"></div><div><div style="font-weight:500">' + n.title + '</div><div style="font-size:11px;color:#888">' + n.source + ' · ' + n.category + '</div></div></div>').join("");
    }
    function toggle(id) { selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id); renderNews(); updateBtn(); }
    function updateBtn() { const c = selectedIds.size; document.getElementById("selectedCount").textContent = c; document.getElementById("sendBtn").disabled = c === 0; }
    async function send() {
      const selected = newsData.filter(n => selectedIds.has(n.id));
      const data = { type: "news_selection", user: { id: user.id, username: user.username }, selected: selected.map(n => ({ id: n.id, title: n.title, category: n.category })), timestamp: Date.now() };
      const btn = document.getElementById("sendBtn");
      btn.disabled = true; btn.textContent = "发送中...";
      log("发送到 VPS...");
      try {
        const res = await fetch(VPS_ENDPOINT, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(data) });
        const result = await res.json();
        if (result.ok) { log("✅ 发送成功!"); btn.textContent = "✅ 已发送 - 等待 Bot 回复"; btn.style.background = "#333"; }
        else { log("❌ 失败：" + result.error); btn.disabled = false; btn.textContent = "🔄 重试"; }
      } catch (e) { log("❌ 网络错误：" + e.message); btn.disabled = false; btn.textContent = "🔄 重试"; }
    }
    document.getElementById("sendBtn").onclick = send;
    document.getElementById("categoryFilter").onclick = e => { if (e.target.classList.contains("category-btn")) { document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active")); e.target.classList.add("active"); currentCategory = e.target.dataset.category; renderNews(); } };
    renderNews();
  </script>
</body>
</html>
